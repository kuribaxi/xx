  function loadOrder(cat) { try { const o = localStorage.getItem(`order_${cat}`); return o ? JSON.parse(o) : null; } catch(e){ return null; } }
  function saveOrder(cat, arr) { localStorage.setItem(`order_${cat}`, JSON.stringify(arr.map(c=>c.url))); }
  function applyStoredOrder(arr, catKey) {
    const stored = loadOrder(catKey);
    if(!stored || !stored.length) return arr;
    const map = new Map(arr.map(c=>[c.url, c]));
    const ordered = [];
    for(let url of stored) if(map.has(url)) ordered.push(map.get(url));
    for(let c of arr) if(!ordered.includes(c)) ordered.push(c);
    return ordered;
  }

    };
  }

  let stallTimer = null;
  let lastTime = -1;
  function startStallWatcher(vid) {
    clearStallWatcher();
    lastTime = -1;
    stallTimer = setInterval(() => {
      if (!vid || vid.paused || vid.ended || vid.readyState < 2) return;
      const t = vid.currentTime;
      if (t === lastTime && vid.readyState < 4) {
        if (hlsInst) {
          try {
            const ranges = vid.buffered;
            if (ranges.length > 0) {
              const end = ranges.end(ranges.length - 1);
              if (end - t > 2) vid.currentTime = end - 1.5;
            }
            hlsInst.startLoad();
          } catch(e) {}
          vid.play().catch(() => {});
        }
      }
      lastTime = t;
    }, 5000);
  }
  function clearStallWatcher() {
    if (stallTimer) { clearInterval(stallTimer); stallTimer = null; }
  }

    if (dashInst) { dashInst.reset(); dashInst = null; }
  }

  function render(filter) {
    curFilter = filter;
    const catNames = { telewebion:'📡 Telewebion', ifilm:'🎬 iFilm' };
    const row = (ch, idx, catKey) => {
      const star = favs.some(f=>f.url===ch.url) ? '⭐' : '☆';
      const activeClass = (cur && cur.url===ch.url) ? 'active' : '';
      const colorClass = ch.color || '';
      return `<div class="channel-item ${colorClass} ${activeClass}" draggable="true" data-url="${esc(ch.url)}" data-name="${esc(ch.name)}" data-cat="${catKey}" data-idx="${idx}">
        <span>${ch.icon ? ch.icon + ' ' : ''}${ch.name}</span>
        <button class="fav-btn" onclick="event.stopPropagation();fav('${esc(ch.url)}','${esc(ch.name)}')">${star}</button>
      </div>`;
    };
    let html = '';
    if (filter && channels[filter]) {
      html = `<div class="category-title">${catNames[filter]} (${channels[filter].length})</div>` +
             channels[filter].map((ch,i) => row(ch,i,filter)).join('');
    } else {
      Object.keys(channels).forEach(cat => {
        html += `<div class="category-title">${catNames[cat]} (${channels[cat].length})</div>` +
                channels[cat].map((ch,i) => row(ch,i,cat)).join('');
      });
    }
    document.getElementById('ch-container').innerHTML = html;
    attachDragListeners();
    attachChannelEvents();
  }

  function attachChannelEvents() {
    document.querySelectorAll('.channel-item').forEach(el => {
      el.addEventListener('click', function(ev) {
        if (ev.target.classList.contains('fav-btn')) return;
        play(this.dataset.url, this.dataset.name, this.dataset.referer || '');
      });
    });
  }

  function attachDragListeners() {
    document.querySelectorAll('.channel-item[draggable="true"]').forEach(el => {
      el.addEventListener('dragstart', dragStart);
      el.addEventListener('dragend', dragEnd);
      el.addEventListener('dragover', dragOver);
      el.addEventListener('dragleave', dragLeave);
      el.addEventListener('drop', drop);
    });
  }

  function dragStart(e) {
    dragSource = e.target.closest('.channel-item');
    if(!dragSource) return;
    e.dataTransfer.setData('text/plain', 'drag');
    e.dataTransfer.effectAllowed = 'move';
    dragSource.style.opacity = '0.5';
  }
  function dragEnd() {
    if(dragSource) dragSource.style.opacity = '';
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
    dragSource = null;
  }
  function dragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.target.closest('.channel-item');
    if(target && target !== dragSource) target.classList.add('drag-over');
  }
  function dragLeave(e) {
    const target = e.target.closest('.channel-item');
    if(target) target.classList.remove('drag-over');
  }
  function drop(e) {
    e.preventDefault();
    const targetItem = e.target.closest('.channel-item');
    if(!dragSource || !targetItem || dragSource === targetItem) { cleanupDrag(); return; }
    const srcCat = dragSource.dataset.cat;
    const tgtCat = targetItem.dataset.cat;
    if(srcCat !== tgtCat) { cleanupDrag(); return; }
    const srcIdx = parseInt(dragSource.dataset.idx);
    const tgtIdx = parseInt(targetItem.dataset.idx);
    if(isNaN(srcIdx) || isNaN(tgtIdx)) { cleanupDrag(); return; }
    let arr = [...channels[srcCat]];
    const [moved] = arr.splice(srcIdx, 1);
    arr.splice(tgtIdx, 0, moved);
    reorderCategory(srcCat, arr);
    render(curFilter);
    cleanupDrag();
  }
  function cleanupDrag() {
    if(dragSource) dragSource.style.opacity = '';
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
    dragSource = null;
  }

  function play(url, name, referer) {
    if (window.innerWidth <= 768) document.getElementById('channel-list').classList.remove('show');
    cur = {url, name, referer};
    document.getElementById('ch-title').textContent = name;
    destroyPlayers();
    const wrap = document.getElementById('vwrap');

    if (!jsEnabled) {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
      const vid = document.getElementById('vplayer');
      vid.src = url;
      vid.play().catch(() => {
        wrap.innerHTML = `<div class="error-msg"><h3>⚠️ JS AV: Kunde inte spela</h3><p>${url.substring(0,70)}</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`;
      });
      render(curFilter);
      return;
    }

    wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div><span style="margin-left:12px;">Laddar ${name}…</span></div>`;
    setTimeout(() => {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
      const vid = document.getElementById('vplayer');
      if (Hls.isSupported()) {
        hlsInst = new Hls(getHlsConfig(referer));
        hlsInst.loadSource(url);
        hlsInst.attachMedia(vid);
        hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
          vid.play().catch(err => console.warn(err));
          startStallWatcher(vid);
        });
        hlsInst.on(Hls.Events.ERROR, (_, d) => {
          if (!d.fatal) return;
          if (d.type === Hls.ErrorTypes.NETWORK_ERROR) {
            const delay = (isTV() || tvMode) ? 3000 : 2000;
            setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, delay);
          } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hlsInst.recoverMediaError();
          } else {
            showErr();
          }
        });
        hlsInst.on(Hls.Events.FRAG_LOAD_EMERGENCY_ABORTED, () => {
          setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, 2000);
        });
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = url;
        vid.play().catch(() => showErr());
        startStallWatcher(vid);
      } else {
        showErr();
      }
      render(curFilter);
    }, 50);
  }

  function showErr() {
    document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte ladda stream</h3><p>Prova att trycka JS AV-knappen ovan.</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`;
  }

  function reload() { if (cur) play(cur.url, cur.name, cur.referer); }
  function pip() { const v=document.getElementById('vplayer'); if(v && document.pictureInPictureEnabled) { document.pictureInPictureElement ? document.exitPictureInPicture() : v.requestPictureInPicture().catch(()=>{}); } }
  function fs() { const w=document.getElementById('vwrap'); document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen().catch(()=>{}); }

  function toggleTV() {
    tvMode = !tvMode;
    document.body.classList.toggle('tv-mode', tvMode);
    document.getElementById('tv-btn').textContent = tvMode ? '🖥️ Normal' : '📺 TV-läge';
    if(tvMode && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    else if(document.fullscreenElement) document.exitFullscreen();
    localStorage.setItem('xomtv', tvMode ? '1' : '');
    if (cur) reload();
  }

  function toggleJSengine() {
    jsEnabled = !jsEnabled;
    const btn = document.getElementById('jsToggleBtn');
    btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
    btn.classList.toggle('js-toggle-off', !jsEnabled);
    if (cur) play(cur.url, cur.name, cur.referer);
    else document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>🔘 JS är nu ${jsEnabled ? 'AKTIVERAD' : 'AVSTÄNGD'}</h3><p>Välj en kanal igen.</p></div>`;
    localStorage.setItem('xom_js_toggle', jsEnabled ? 'on' : 'off');
  }

  function showAll(btn) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(null);
  }
  function filterCat(btn, cat) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(cat);
  }
  function toggleList() { document.getElementById('channel-list').classList.toggle('show'); }
  function fav(url, name) {
    const i = favs.findIndex(f=>f.url===url);
    i > -1 ? favs.splice(i,1) : favs.push({url,name});
    localStorage.setItem('xomfavs', JSON.stringify(favs));
    render(curFilter);
  }

  (function loadPrefs() {
    try {
      const savedJS = localStorage.getItem('xom_js_toggle');
      jsEnabled = savedJS !== 'off';
      const btn = document.getElementById('jsToggleBtn');
      btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
      btn.classList.toggle('js-toggle-off', !jsEnabled);
    } catch(err) {}
    const ua = navigator.userAgent || '';
    const detectedTV = /SmartTV|webOS|SMART-TV|HbbTV|NetCast|BRAVIA|Tizen/i.test(ua) ||
      (window.innerWidth >= 1920 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0);
    if (detectedTV || localStorage.getItem('xomtv') === '1') {
      document.body.classList.add('tv-mode');
      tvMode = true;
      document.getElementById('tv-btn').textContent = '🖥️ Normal';
    }
  })();

  render(null);
</script>
</body>
</html>
