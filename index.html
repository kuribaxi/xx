<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📺 Telewebion Kanaler</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0a1f3b, #1a3b5c); 
      color: #fff; 
      min-height: 100vh;
    }
    .header { 
      background: rgba(0,0,0,0.4); 
      padding: 25px 20px; 
      text-align: center; 
      border-bottom: 3px solid #4ecca3;
    }
    .header h1 { 
      font-size: 2.8em; 
      color: #4ecca3; 
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .header p { 
      font-size: 1.2em; 
      opacity: 0.9;
    }
    .stats {
      margin-top: 10px;
      font-size: 1.1em;
      color: #ffd700;
    }
    .container { 
      display: flex; 
      height: calc(100vh - 170px); 
      padding: 20px; 
      gap: 20px; 
    }
    .channel-list { 
      width: 320px; 
      background: rgba(0,0,0,0.5); 
      backdrop-filter: blur(5px);
      overflow-y: auto; 
      border-radius: 15px; 
      padding: 15px; 
      border: 1px solid rgba(78,204,163,0.3);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .channel-list h3 {
      color: #4ecca3;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #4ecca3;
      font-size: 1.4em;
    }
    .video-container { 
      flex: 1; 
      background: #000; 
      border-radius: 15px; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column;
      border: 1px solid #4ecca3;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }
    .video-header { 
      background: rgba(0,0,0,0.9); 
      padding: 18px 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      border-bottom: 1px solid #4ecca3;
      flex-wrap: wrap;
      gap: 10px;
    }
    .video-title { 
      font-size: 1.5em; 
      color: #4ecca3;
      font-weight: bold;
    }
    .video-controls { 
      display: flex; 
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn { 
      background: #4ecca3; 
      color: #0a1f3b; 
      border: none; 
      padding: 8px 18px; 
      border-radius: 25px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 0.95em;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .btn:hover { 
      background: #3bb083; 
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(78,204,163,0.4);
    }
    .btn.outline {
      background: transparent;
      border: 1px solid #4ecca3;
      color: #4ecca3;
    }
    .btn.outline:hover {
      background: rgba(78,204,163,0.2);
    }
    .btn.js-off {
      background: #c95a2e !important;
      color: #fff !important;
      border-color: #ff884d !important;
      box-shadow: 0 0 8px #ff884d;
    }
    .video-wrapper { 
      flex: 1; 
      position: relative; 
      background: #000; 
    }
    video, iframe { 
      width: 100%; 
      height: 100%; 
      border: none;
      object-fit: contain;
    }
    .error-msg { 
      text-align: center; 
      padding: 50px;
      color: #999;
    }
    .error-msg h3 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #4ecca3;
    }
    .channel-item { 
      padding: 14px 15px; 
      margin: 8px 0; 
      cursor: pointer; 
      border-radius: 12px; 
      background: rgba(255,255,255,0.08); 
      transition: all 0.2s;
      border-left: 4px solid transparent;
      font-size: 1.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .channel-item:hover { 
      background: rgba(78,204,163,0.25); 
      transform: translateX(5px);
      border-left-color: #4ecca3;
    }
    .channel-item.active { 
      background: rgba(78,204,163,0.4); 
      border-left-color: #ffd700;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .channel-icon { font-size: 1.3em; }
    .channel-count {
      display: inline-block;
      background: #4ecca3;
      color: #0a1f3b;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.8em;
      margin-left: 10px;
      font-weight: bold;
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #4ecca3; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #3bb083; }
    @media (max-width: 768px) {
      .container { flex-direction: column; height: auto; }
      .channel-list { width: 100%; max-height: 300px; }
      .header h1 { font-size: 2em; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📡 TELEWEBION KANALER</h1>
    <p>Alla tillgängliga kanaler från telewebion.ir</p>
    <div class="stats" id="channel-count">Laddar kanaler...</div>
  </div>

  <div class="container">
    <aside class="channel-list">
      <h3>📺 Kanaler <span class="channel-count" id="count-badge">0</span></h3>
      <div id="channel-container"></div>
    </aside>
    
    <main class="video-container">
      <div class="video-header">
        <div class="video-title" id="current-channel">Välj en kanal</div>
        <div class="video-controls">
          <button class="btn outline" onclick="toggleFullscreen()">⛶ Fullskärm</button>
          <button class="btn outline" onclick="reloadChannel()">↻ Ladda om</button>
          <button class="btn" id="jsToggleBtn" onclick="toggleJS()">⚙️ JS PÅ</button>
        </div>
      </div>
      <div class="video-wrapper" id="video-wrapper">
        <div class="error-msg">
          <h3>👈 Välj en kanal från listan</h3>
          <p>Klicka på valfri kanal för att starta streaming</p>
        </div>
      </div>
    </main>
  </div>

      { name: 'BUSHEHR',      url: 'https://cdnw.telewebion.com/bushehr/live/playlist.m3u8',            icon: '🌊' },
      { name: 'JAHANBIN',     url: 'https://cdnw.telewebion.com/jahanbin/live/playlist.m3u8',           icon: '🔭' },
      { name: 'ABADAN',       url: 'https://cdnw.telewebion.com/abadan/live/playlist.m3u8',             icon: '🏭' },
      { name: 'KH.RAZAVI',    url: 'https://cdnw.telewebion.com/khorasanrazavi/live/playlist.m3u8',     icon: '🕌' },
      { name: 'ATRAK',        url: 'https://cdnw.telewebion.com/atrak/live/playlist.m3u8',              icon: '🌊' },
      { name: 'KHALIJFARS',   url: 'https://cdnw.telewebion.com/khalijefars/live/playlist.m3u8',        icon: '🌊' },
      { name: 'KHOZESTAN',    url: 'https://cdnw.telewebion.com/khoozestan/live/playlist.m3u8',         icon: '🏜️' },
      { name: 'ESHRAGH',      url: 'https://cdnw.telewebion.com/eshragh/live/playlist.m3u8',            icon: '✨' },
      { name: 'SEMNAN',       url: 'https://cdnw.telewebion.com/semnan/live/playlist.m3u8',             icon: '🏜️' },
      { name: 'HAMON',        url: 'https://cdnw.telewebion.com/hamoon/live/playlist.m3u8',             icon: '🏞️' },
      { name: 'FARS',         url: 'https://cdnw.telewebion.com/fars/live/playlist.m3u8',               icon: '🏛️' },
      { name: 'GHAZVIN',      url: 'https://cdnw.telewebion.com/qazvin/live/playlist.m3u8',             icon: '🏛️' },
      { name: 'NOOR',         url: 'https://cdnw.telewebion.com/noor/live/playlist.m3u8',               icon: '💡' },

      { name: 'KERMAN',       url: 'https://cdnw.telewebion.com/kerman/live/playlist.m3u8',             icon: '🏜️' },
      { name: 'ZAGROS',       url: 'https://cdnw.telewebion.com/zagros/live/playlist.m3u8',             icon: '⛰️' },

      { name: 'KISH',         url: 'https://cdnw.telewebion.com/kish/live/playlist.m3u8',               icon: '🏝️' },
      { name: 'GOLESTAN',     url: 'https://cdnw.telewebion.com/sabz/live/playlist.m3u8',               icon: '🌳' },
      { name: 'BARAN',        url: 'https://cdnw.telewebion.com/baran/live/playlist.m3u8',              icon: '☔' },
      { name: 'KORDESTAN',    url: 'https://cdnw.telewebion.com/kordestan/live/playlist.m3u8',          icon: '🏔️' },
      { name: 'YAZD',         url: 'https://cdnw.telewebion.com/taban/live/playlist.m3u8',              icon: '🏜️' },
      { name: 'TABARESTAN',   url: 'https://cdnw.telewebion.com/tabarestan/live/playlist.m3u8',         icon: '🌳' },
      { name: 'AFTAB',        url: 'https://cdnw.telewebion.com/aftab/live/playlist.m3u8',              icon: '☀️' },
      { name: 'MAHABAD',      url: 'https://cdnw.telewebion.com/mahabad/live/playlist.m3u8',            icon: '🏞️' },
      { name: 'HAMADAN',      url: 'https://cdnw.telewebion.com/sina/live/playlist.m3u8',               icon: '🏛️' },
      { name: 'KHAVARAN',     url: 'https://cdnw.telewebion.com/khavaran/live/playlist.m3u8',           icon: '🌅' },
      { name: 'HABIB',        url: 'https://cdnw.telewebion.com/habib/live/playlist.m3u8',              icon: '🤝' },
      { name: 'JAM JAM 1',    url: 'https://cdnw.telewebion.com/jjtv1/live/playlist.m3u8',              icon: '🌐' },
      { name: 'JAM JAM 2',    url: 'https://cdnw.telewebion.com/jjtv2/live/playlist.m3u8',              icon: '🌐' },
      { name: 'JAM JAM 3',    url: 'https://cdnw.telewebion.com/jjtv3/live/playlist.m3u8',              icon: '🌐' },
      { name: 'iFilm Arabic', url: 'https://cdnw.telewebion.com/ifilmar/live/playlist.m3u8',            icon: '🎬' },
      { name: 'KAWTHAR',      url: 'https://cdnw.telewebion.com/kawthar/live/playlist.m3u8',            icon: '📖' },
      { name: 'ARA',          url: 'https://cdnw.telewebion.com/ara/live/playlist.m3u8',                icon: '🎨' },
      { name: 'AYAM',         url: 'https://cdnw.telewebion.com/ayam/live/playlist.m3u8',               icon: '📅' },
      { name: 'GARDESH',      url: 'https://cdnw.telewebion.com/gardesh/live/playlist.m3u8',            icon: '🌿' },
      { name: 'LABBAYK',      url: 'https://cdnw.telewebion.com/labbayk/live/playlist.m3u8',            icon: '🕌' },
      { name: 'JAM',          url: 'https://cdnw.telewebion.com/jam/live/playlist.m3u8',                icon: '🎵' },
      { name: 'SHOMA',        url: 'https://cdnw.telewebion.com/shoma/live/playlist.m3u8',              icon: '👥' },
      { name: 'IRANKALA',     url: 'https://cdnw.telewebion.com/irankala/live/playlist.m3u8',           icon: '🛍️' },
    ];

    telewebionChannels.sort((a, b) => a.name.localeCompare(b.name));

    let currentChannel = null;
    let hlsInst = null;
    let jsEnabled = true;

    // Återställ JS-knapp-state från localStorage
    try {
      const saved = localStorage.getItem('twjs');
      if (saved === 'off') jsEnabled = false;
    } catch(e) {}

    document.getElementById('channel-count').textContent = `Totalt ${telewebionChannels.length} kanaler`;
    document.getElementById('count-badge').textContent = telewebionChannels.length;

    function updateJsBtn() {
      const btn = document.getElementById('jsToggleBtn');
      if (jsEnabled) {
        btn.textContent = '⚙️ JS PÅ';
        btn.classList.remove('js-off');
      } else {
        btn.textContent = '⚠️ JS AV';
        btn.classList.add('js-off');
      }
    }

    function toggleJS() {
      jsEnabled = !jsEnabled;
      try { localStorage.setItem('twjs', jsEnabled ? 'on' : 'off'); } catch(e) {}
      updateJsBtn();
      if (currentChannel) playChannel(currentChannel.url, currentChannel.name, currentChannel.icon);
    }

    function destroyHls() {
      if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
    }

    function renderChannels() {
      const container = document.getElementById('channel-container');
      let html = '';
      telewebionChannels.forEach(ch => {
        const isActive = currentChannel && currentChannel.url === ch.url ? 'active' : '';
        const safeUrl  = ch.url.replace(/'/g, "\\'");
        const safeName = ch.name.replace(/'/g, "\\'");
        html += `<div class="channel-item ${isActive}" onclick="playChannel('${safeUrl}','${safeName}','${ch.icon}')">
          <span class="channel-icon">${ch.icon}</span>
          <span>${ch.name}</span>
        </div>`;
      });
      container.innerHTML = html;
    }

    function playChannel(url, name, icon) {
      currentChannel = { url, name, icon };
      document.getElementById('current-channel').innerHTML = `${icon} ${name}`;
      destroyHls();

      const wrapper = document.getElementById('video-wrapper');

      // JS AV — enkel video-tagg, webbläsarens inbyggda HLS (fungerar på Safari/TV)
      if (!jsEnabled) {
        wrapper.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;background:#000;"></video>';
        const vid = document.getElementById('vplayer');
        vid.src = url;
        vid.play().catch(() => {
          wrapper.innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte spela</h3><p>Aktivera JS PÅ och försök igen.</p><button class="btn" onclick="toggleJS()">⚙️ Aktivera JS</button></div>`;
        });
        renderChannels();
        return;
      }

      // JS PÅ — använd HLS.js för bästa kompatibilitet
      wrapper.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;background:#000;"></video>';
      const vid = document.getElementById('vplayer');

      if (Hls.isSupported()) {
        hlsInst = new Hls({
          enableWorker: true,
          startPosition: -1,
          liveSyncDurationCount: 3,
          maxBufferLength: 30,
          maxMaxBufferLength: 90,
          fragLoadingMaxRetry: 6,
          manifestLoadingMaxRetry: 5,
        });
        hlsInst.loadSource(url);
        hlsInst.attachMedia(vid);
        hlsInst.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(() => {}));
        hlsInst.on(Hls.Events.ERROR, (_, d) => {
          if (!d.fatal) return;
          if (d.type === Hls.ErrorTypes.NETWORK_ERROR) setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, 2000);
          else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInst.recoverMediaError();
          else wrapper.innerHTML = `<div class="error-msg"><h3>⚠️ Stream-fel</h3><p>Prova att trycka ↻ Ladda om eller byt JS-läge.</p></div>`;
        });
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari / Apple TV inbyggt HLS-stöd
        vid.src = url;
        vid.play().catch(() => {});
      } else {
        wrapper.innerHTML = `<div class="error-msg"><h3>⚠️ HLS stöds inte</h3><p>Din webbläsare stöder inte HLS-streams.</p></div>`;
      }

      renderChannels();
    }

    function reloadChannel() {
      if (currentChannel) playChannel(currentChannel.url, currentChannel.name, currentChannel.icon);
    }

    function toggleFullscreen() {
      const wrapper = document.getElementById('video-wrapper');
      if (!document.fullscreenElement) wrapper.requestFullscreen();
      else document.exitFullscreen();
    }

    updateJsBtn();
    renderChannels();
  </script>
</body>
</html>
