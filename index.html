<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Telewebion · iFilm | Upplösning + JS</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; min-height: 100vh; }
    .header { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); padding: 18px 20px; text-align: center; border-bottom: 1px solid rgba(78,204,163,0.3); }
    .header h1 { font-size: 2.3em; color: #4ecca3; letter-spacing: -0.5px; }
    .nav-buttons { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 16px 20px; background: rgba(0,0,0,0.2); }
    .nav-btn { background: #1e2f3f; color: #e0e0e0; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .nav-btn:hover, .nav-btn.active { background: #4ecca3; color: #0a1c2a; transform: scale(1.02); }
    .container { display: flex; height: calc(100vh - 220px); padding: 0 20px 20px; gap: 20px; }
    .channel-list { width: 340px; background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); overflow-y: auto; border-radius: 24px; padding: 14px; }
    .video-container { flex: 1; background: #03090e; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; }
    .video-header { background: rgba(0,0,0,0.7); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .video-title { font-size: 1.25rem; color: #4ecca3; }
    .video-controls button { padding: 7px 14px; margin-left: 6px; background: #1f3e48; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 0.85rem; }
    .video-controls button:hover { background: #4ecca3; color: #000; }
    .video-wrapper { flex: 1; background: #000; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .channel-item { padding: 10px 12px; margin: 6px 0; border-radius: 16px; background: rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .channel-item:hover { background: rgba(78,204,163,0.3); }
    .res-select { background: #1e2f3f; color: white; border: 1px solid #4ecca3; padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; }
    .js-btn { background: #c95a2e; color: white; }
    .js-btn.on { background: #4ecca3; color: #000; }
    .spinner { width: 30px; height: 30px; border: 4px solid rgba(78,204,163,0.3); border-top-color: #4ecca3; border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px; color: #ffbb99; }
  </style>
</head>
<body>
<div class="header">
  <h1>📡 Telewebion · iFilm</h1>
  <p>Välj kanal + upplösning • JS PÅ/AV</p>
</div>

<div class="nav-buttons">
  <button class="nav-btn active" onclick="showAll(this)">Alla</button>
  <button class="nav-btn" onclick="filterSubgroup(this,'sarasari')">🌐 Sarasari</button>
  <button class="nav-btn" onclick="filterSubgroup(this,'ostani')">🏙️ Ostani</button>
  <button class="nav-btn" onclick="filterSubgroup(this,'ekhtesasi')">🎯 Ekhtesasi</button>
  <button class="nav-btn" onclick="filterSubgroup(this,'radio')">📻 Radio</button>
  <button class="nav-btn" onclick="filterCat(this,'ifilm')">🎬 iFilm</button>
</div>

<div class="container">
  <aside class="channel-list" id="channel-list">
    <div id="ch-container"></div>
  </aside>
  <main class="video-container">
    <div class="video-header">
      <div class="video-title" id="ch-title">Välj kanal och upplösning</div>
      <div class="video-controls">
        <button onclick="reload()">↻ Ladda om</button>
        <button id="jsBtn" class="js-btn on" onclick="toggleJS()">⚙️ JS PÅ</button>
      </div>
    </div>
    <div class="video-wrapper" id="vwrap">
      <div class="error-msg"><h3>👈 Välj en kanal från listan</h3></div>
    </div>
  </main>
</div>

<script>
// ==================== KANALDATA ====================
const baseDomain = "https://live-azd1102.telewebion.ir/ek/";

const telewebionChannels = [
  {name: "TV1", base: "tv1", icon: "📡", subgroup: "sarasari"},
  {name: "TV2", base: "tv2", icon: "📡", subgroup: "sarasari"},
  {name: "TV3", base: "tv3", icon: "📡", subgroup: "sarasari"},
  {name: "TV4", base: "tv4", icon: "📡", subgroup: "sarasari"},
  {name: "TAMASHA", base: "hdtest", icon: "🎭", subgroup: "sarasari"},
  {name: "POOYA", base: "pooya", icon: "🧸", subgroup: "sarasari"},
  {name: "IFILM", base: "ifilm", icon: "🎬", subgroup: "sarasari"},
  {name: "NAMAYESH", base: "namayesh", icon: "🎪", subgroup: "sarasari"},
  {name: "TEHRAN", base: "tehran", icon: "🏙️", subgroup: "sarasari"},
  {name: "MOSTANAD", base: "mostanad", icon: "📽️", subgroup: "sarasari"},
  {name: "QURAN", base: "quran", icon: "📖", subgroup: "sarasari"},
  {name: "AMOUZESH", base: "amouzesh", icon: "📚", subgroup: "sarasari"},
  {name: "SALAMAT", base: "salamat", icon: "💚", subgroup: "sarasari"},
  {name: "OFOGH", base: "ofogh", icon: "🌟", subgroup: "sarasari"},
  {name: "OMID", base: "omid", icon: "⭐", subgroup: "sarasari"},
  {name: "SEPEHR", base: "sepehr", icon: "🕌", subgroup: "sarasari"},
  {name: "IRINN", base: "irinn", icon: "📰", subgroup: "sarasari"},
  {name: "ESFAHAN", base: "esfahan", icon: "🕌", subgroup: "ostani"},
  {name: "FARS", base: "fars", icon: "🏛️", subgroup: "ostani"},
  {name: "KHOZESTAN", base: "khoozestan", icon: "🏜️", subgroup: "ostani"},
  {name: "HABIB", base: "habib", icon: "🤝", subgroup: "ekhtesasi"},
  {name: "VELAYAT", base: "velayat", icon: "📖", subgroup: "ekhtesasi"},
];

const ifilmChannels = [
  {name: "iFilm Farsi", url: "https://live.presstv.ir/hls/ifilmfa.m3u8"},
  {name: "iFilm English", url: "https://live.presstv.ir/hls/ifilmen.m3u8"},
  {name: "iFilm Arabic", url: "https://live.presstv.ir/hls/ifilmar.m3u8"},
];

const resolutions = ["1080p", "720p", "576p"];

let cur = null;
let hlsInst = null;
let jsEnabled = true;   // JS är på som standard

// ==================== HJÄLPFUNKTIONER ====================
function getUrl(base, res) {
  return `${baseDomain}${base}/live/${res}/index.m3u8`;
}

function render(filter, sgFilter) {
  let html = '';

  if (filter === 'telewebion' || !filter) {
    let list = telewebionChannels;
    if (sgFilter) list = telewebionChannels.filter(ch => ch.subgroup === sgFilter);

    html += `<div style="color:#4ecca3; font-weight:bold; padding:8px 4px;">Telewebion ${sgFilter ? sgFilter : ''}</div>`;
    list.forEach(ch => {
      html += `
        <div class="channel-item">
          <span>${ch.icon} ${ch.name}</span>
          <select class="res-select" onchange="playChannel('${ch.base}', '${ch.name}', this.value)">
            ${resolutions.map(r => `<option value="${r}">${r}</option>`).join('')}
          </select>
        </div>`;
    });
  }

  if ((filter === 'ifilm' || !filter) && !sgFilter) {
    html += `<div style="color:#4ecca3; font-weight:bold; padding:8px 4px;">🎬 iFilm</div>`;
    ifilmChannels.forEach(ch => {
      html += `<div class="channel-item" onclick="playFixed('${ch.url}', '${ch.name}')">${ch.name}</div>`;
    });
  }

  document.getElementById('ch-container').innerHTML = html;
}

function playChannel(base, name, res) {
  const url = getUrl(base, res);
  cur = {url, name, base, res, type: 'telewebion'};
  document.getElementById('ch-title').textContent = `${name} — ${res}`;

  loadVideo(url);
}

function playFixed(url, name) {
  cur = {url, name, type: 'ifilm'};
  document.getElementById('ch-title').textContent = name;
  loadVideo(url);
}

function loadVideo(url) {
  const wrap = document.getElementById('vwrap');
  wrap.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100%;"><div class="spinner"></div><br>Laddar...</div>`;

  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }

  wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
  const vid = document.getElementById('vplayer');

  if (!jsEnabled) {
    // Native mode (JS AV)
    vid.src = url;
    vid.play().catch(() => {});
    return;
  }

  // JS mode (hls.js)
  if (Hls.isSupported()) {
    hlsInst = new Hls({
      maxBufferLength: 20,
      liveSyncDurationCount: 3,
      startLevel: -1
    });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(() => {}));
  } else {
    vid.src = url;
    vid.play().catch(() => {});
  }
}

function reload() {
  if (!cur) return;
  if (cur.type === 'telewebion') playChannel(cur.base, cur.name, cur.res);
  else playFixed(cur.url, cur.name);
}

function toggleJS() {
  jsEnabled = !jsEnabled;
  const btn = document.getElementById('jsBtn');
  if (jsEnabled) {
    btn.textContent = "⚙️ JS PÅ";
    btn.classList.add('on');
  } else {
    btn.textContent = "⚠️ JS AV";
    btn.classList.remove('on');
  }
  if (cur) reload();   // starta om aktuell kanal med ny inställning
}

// Navigationsfunktioner
function showAll(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(null, null); }
function filterSubgroup(btn, sg) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render('telewebion', sg); }
function filterCat(btn, cat) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(cat, null); }

// Start
render(null, null);
</script>
</body>
</html>
