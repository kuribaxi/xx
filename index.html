function buildTelewebionFlat() {
  const flat = [];
  for (const sg of subgroups.telewebion) {
    for (const ch of sg.channels) flat.push({...ch, subgroup: sg.key});
  }
  return flat;
}

function loadOrder(cat) {
  try { const o = localStorage.getItem(`order_${cat}`); return o ? JSON.parse(o) : null; } catch(e){ return null; }
}
function saveOrder(cat, arr) {
  localStorage.setItem(`order_${cat}`, JSON.stringify(arr.map(c=>c.url)));
}
function applyStoredOrderFlat(flat, catKey) {
  const stored = loadOrder(catKey);
  if(!stored || !stored.length) return flat;
  const map = new Map(flat.map(c=>[c.url, c]));
  const ordered = [];
  for(let url of stored) if(map.has(url)) ordered.push(map.get(url));
  for(let c of flat) if(!ordered.some(o => o.url === c.url)) ordered.push(c);
  return ordered;
}

function isTV() {
  const ua = navigator.userAgent || '';
  return /SmartTV|webOS|SMART-TV|HbbTV|NetCast|BRAVIA|Tizen/i.test(ua) ||
    (window.innerWidth >= 1920 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0);
}

function getHlsConfig(referer) {

    enableWorker: true,
    startPosition: -1,
    lowLatencyMode: false,
    maxBufferLength: tv ? 30 : 60,
    maxMaxBufferLength: tv ? 90 : 300,

    nudgeOffset: 0.2,
    fragLoadingTimeOut: 20000,

      const ua = document.getElementById('ua-select').value;
      if (ua) try { xhr.setRequestHeader('User-Agent', ua); } catch(err){}
      if (referer) try { xhr.setRequestHeader('Referer', referer); } catch(err){}
    }
  };
}

// ================ STALL & RECONNECT ================
function startStallWatcher(vid) {
  clearStallWatcher();
  lastTime = -1; lastTimeStamp = Date.now();
  stallTimer = setInterval(() => {
    if (!vid || vid.paused || vid.ended || vid.readyState < 2) return;
    const now = Date.now();
    const t = vid.currentTime;
    if (t === lastTime) {
      if ((now - lastTimeStamp)/1000 >= 6) softReconnect();
    } else {
      lastTime = t; lastTimeStamp = now;
    }
  }, 1500);
}
function clearStallWatcher() { if(stallTimer) clearInterval(stallTimer); }

function softReconnect() {
  if (!cur || !hlsInst) return;
  try {
    hlsInst.stopLoad();
    setTimeout(() => {
      if (hlsInst) {
        hlsInst.loadSource(cur.url);
        hlsInst.startLoad(-1);
        const vid = document.getElementById('vplayer');
        if (vid) vid.play().catch(()=>{});
      }
    }, 1200);
  } catch(e){}
}

function startKeepAlive() {
  if (keepAliveTimer) clearInterval(keepAliveTimer);
  keepAliveTimer = setInterval(() => {
    const vid = document.getElementById('vplayer');
    if (vid && !vid.paused && vid.readyState === 0) softReconnect();
  }, 8000);
}

function destroyPlayers() {
  clearStallWatcher();
  if (keepAliveTimer) clearInterval(keepAliveTimer);
  if (retryTimer) clearTimeout(retryTimer);
  if (hlsInst) try { hlsInst.destroy(); } catch(e){}
  hlsInst = null;
  retryCount = 0;
}

// ================ RENDER KANALLISTA ================
function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function render(filter, sgFilter) {
  curFilter = filter;
  curSubgroup = sgFilter;
  let html = '';

  const catNames = { telewebion: '📡 Telewebion', ifilm: '🎬 iFilm' };

  function chRow(ch, idx, catKey) {
    const star = favs.some(f => f.url === ch.url) ? '⭐' : '☆';
    const active = (cur && cur.url === ch.url) ? 'active' : '';
    const color = ch.color || '';
    return `<div class="channel-item ${color} ${active}" draggable="true" data-url="${esc(ch.url)}" data-name="${esc(ch.name)}" data-cat="${catKey}" data-idx="${idx}">
      <span>${ch.icon ? ch.icon + ' ' : ''}${ch.name}</span>
      <button class="fav-btn" onclick="event.stopPropagation();fav('${esc(ch.url)}','${esc(ch.name)}')">${star}</button>
    </div>`;
  }

  if (filter === 'telewebion' || !filter) {
    const catArr = channelsDB.telewebion;
    const sgMap = new Map();
    for (const sg of subgroups.telewebion) sgMap.set(sg.key, {label: sg.label, items: []});
    catArr.forEach((ch, idx) => {
      const key = ch.subgroup || 'sarasari';
      if (sgMap.has(key)) sgMap.get(key).items.push({ch, idx});
    });

    if (sgFilter) {
      const sg = sgMap.get(sgFilter);
      if (sg && sg.items.length) {
        html += `<div class="category-title">${sg.label} (${sg.items.length})</div>`;
        html += sg.items.map(i => chRow(i.ch, i.idx, 'telewebion')).join('');
      }
    } else {
      html += `<div class="category-title">${catNames.telewebion} (${catArr.length})</div>`;
      for (const [key, sg] of sgMap) {
        if (sg.items.length === 0) continue;
        html += `<div class="subgroup-title">${sg.label}</div>`;
        html += sg.items.map(i => chRow(i.ch, i.idx, 'telewebion')).join('');
      }
    }
  }

  if ((filter === 'ifilm' || !filter) && !sgFilter) {
    const catArr = channelsDB.ifilm;
    html += `<div class="category-title">${catNames.ifilm} (${catArr.length})</div>`;
    html += catArr.map((ch, i) => chRow(ch, i, 'ifilm')).join('');
  }

  document.getElementById('ch-container').innerHTML = html;
  attachDragListeners();
  attachChannelEvents();
}

function attachChannelEvents() {
  document.querySelectorAll('.channel-item').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('fav-btn')) return;
      play(this.dataset.url, this.dataset.name, '');
    });
  });
}

function attachDragListeners() {
  document.querySelectorAll('.channel-item[draggable="true"]').forEach(el => {
    el.addEventListener('dragstart', dragStart);
    el.addEventListener('dragend', dragEnd);
    el.addEventListener('dragover', dragOver);
    el.addEventListener('dragleave', dragLeave);
    el.addEventListener('drop', drop);
  });
}

// Drag & Drop funktioner (samma som tidigare)
function dragStart(e) { dragSource = e.target.closest('.channel-item'); if(dragSource) e.dataTransfer.setData('text/plain', 'drag'); }
function dragEnd() { if(dragSource) dragSource.style.opacity = ''; document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over')); dragSource = null; }
function dragOver(e) { e.preventDefault(); const t = e.target.closest('.channel-item'); if(t && t !== dragSource) t.classList.add('drag-over'); }
function dragLeave(e) { const t = e.target.closest('.channel-item'); if(t) t.classList.remove('drag-over'); }
function drop(e) {
  e.preventDefault();
  const target = e.target.closest('.channel-item');
  if (!dragSource || !target || dragSource === target) { cleanupDrag(); return; }
  const srcCat = dragSource.dataset.cat;
  const tgtCat = target.dataset.cat;
  if (srcCat !== tgtCat) { cleanupDrag(); return; }
  const srcIdx = parseInt(dragSource.dataset.idx);
  const tgtIdx = parseInt(target.dataset.idx);
  let arr = [...channelsDB[srcCat]];
  const [moved] = arr.splice(srcIdx, 1);
  arr.splice(tgtIdx, 0, moved);
  reorderCategory(srcCat, arr);
  render(curFilter, curSubgroup);
  cleanupDrag();
}
function cleanupDrag() {
  if(dragSource) dragSource.style.opacity = '';
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
  dragSource = null;
}

function reorderCategory(catKey, newArr) {
  channelsDB[catKey] = newArr;
  saveOrder(catKey, newArr);
}

// ================ SPELARE ================
function play(url, name, referer = '') {
  if (window.innerWidth <= 768) document.getElementById('channel-list').classList.remove('show');
  cur = {url, name, referer};
  document.getElementById('ch-title').textContent = name;
  destroyPlayers();
  const wrap = document.getElementById('vwrap');
  wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div><span style="margin-left:12px;">Laddar ${name}…</span></div>`;
  render(curFilter, curSubgroup);
  setTimeout(() => playInternal(url, name, referer), 50);
}

function playInternal(url, name, referer) {
  const wrap = document.getElementById('vwrap');
  if (!jsEnabled) {
    wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
    const vid = document.getElementById('vplayer');
    vid.src = url;
    vid.play().catch(() => {});
    return;
  }

  wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
  const vid = document.getElementById('vplayer');

  if (Hls.isSupported()) {
    hlsInst = new Hls(getHlsConfig(referer));
    hlsInst.loadSource(url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
      vid.play().catch(() => {});
      startStallWatcher(vid);
      startKeepAlive();
    });
    hlsInst.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
        console.log("Network error – retrying...");
      }
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = url;
    vid.play().catch(() => {});
    startStallWatcher(vid);
    startKeepAlive();
  }
}

function reload() { if (cur) play(cur.url, cur.name, cur.referer || ''); }

function pip() {
  const v = document.getElementById('vplayer');
  if (v && document.pictureInPictureEnabled) {
    document.pictureInPictureElement ? document.exitPictureInPicture() : v.requestPictureInPicture();
  }
}
function fs() {
  const w = document.getElementById('vwrap');
  document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen().catch(()=>{});
}

function toggleTV() {
  tvMode = !tvMode;
  document.body.classList.toggle('tv-mode', tvMode);
  document.getElementById('tv-btn').textContent = tvMode ? '🖥️ Normal' : '📺 TV-läge';
  if (cur) reload();
}

function toggleJSengine() {
  jsEnabled = !jsEnabled;
  const btn = document.getElementById('jsToggleBtn');
  btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
  btn.classList.toggle('js-toggle-off', !jsEnabled);
  if (cur) play(cur.url, cur.name, cur.referer || '');
}

function showAll(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curFilter = null; curSubgroup = null;
  render(null, null);
}
function filterCat(btn, cat) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curSubgroup = null;
  render(cat, null);
}
function filterSubgroup(btn, sgKey) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render('telewebion', sgKey);
}
function toggleList() {
  document.getElementById('channel-list').classList.toggle('show');
}
function fav(url, name) {
  const i = favs.findIndex(f => f.url === url);
  i > -1 ? favs.splice(i,1) : favs.push({url, name});
  localStorage.setItem('xomfavs', JSON.stringify(favs));
  render(curFilter, curSubgroup);
}

// ================ INIT ================
(function loadPrefs() {
  try {
    const savedJS = localStorage.getItem('xom_js_toggle');
    jsEnabled = savedJS !== 'off';
    const btn = document.getElementById('jsToggleBtn');
    btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
    btn.classList.toggle('js-toggle-off', !jsEnabled);
  } catch(err) {}
  const detectedTV = isTV() || localStorage.getItem('xomtv') === '1';
  if (detectedTV) {
    tvMode = true;
    document.body.classList.add('tv-mode');
    document.getElementById('tv-btn').textContent = '🖥️ Normal';
  }
  render(null, null);
})();
</script>
