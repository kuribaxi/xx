  function buildTelewebionFlat() {
    const flat = [];
    for (const sg of subgroups.telewebion) {
      for (const ch of sg.channels) flat.push({...ch, subgroup: sg.key});
    }
    return flat;
  }

  function loadOrder(cat) { try { const o = localStorage.getItem(`order_${cat}`); return o ? JSON.parse(o) : null; } catch(e){ return null; } }
  function saveOrder(cat, arr) { localStorage.setItem(`order_${cat}`, JSON.stringify(arr.map(c=>c.url))); }

  function applyStoredOrderFlat(flat, catKey) {
    const stored = loadOrder(catKey);
    if(!stored || !stored.length) return flat;
    const map = new Map(flat.map(c=>[c.url, c]));
    const ordered = [];
    for(let url of stored) if(map.has(url)) ordered.push(map.get(url));
    for(let c of flat) if(!ordered.includes(c)) ordered.push(c);
    return ordered;
  }

  const telewebionFlat = applyStoredOrderFlat(buildTelewebionFlat(), 'telewebion');
  const ifilmOrdered   = applyStoredOrderFlat([...ifilmRaw], 'ifilm');

  const channels = {
    telewebion: telewebionFlat,
    ifilm: ifilmOrdered
  };

  function reorderCategory(catKey, newArr) {
    channels[catKey] = newArr;
    saveOrder(catKey, newArr);

  function isTV() {
    const ua = navigator.userAgent || '';
    return /SmartTV|webOS|SMART-TV|HbbTV|NetCast|BRAVIA|Tizen/i.test(ua) ||
      (window.innerWidth >= 1920 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0);
  }

  // --- IMPROVED: Much larger buffers, more retries, lower latency tolerance ---
  function getHlsConfig(referer) {
    const tv = isTV() || tvMode;
    return {
      enableWorker: true,
      startPosition: -1,
      lowLatencyMode: false,

      // Large buffer to absorb network hiccups
      maxBufferLength: 60,
      maxMaxBufferLength: 300,
      maxBufferSize: 200 * 1000 * 1000,   // 200 MB
      maxBufferHole: 2.0,                  // Skip over gaps up to 2s without pausing

      // Live stream sync - stay a bit behind to avoid edge stalls
      liveSyncDurationCount: 8,
      liveMaxLatencyDurationCount: 20,
      liveDurationInfinity: true,

      // Aggressive retry on all failures
      fragLoadingMaxRetry: 20,
      fragLoadingRetryDelay: 500,
      fragLoadingMaxRetryTimeout: 30000,
      manifestLoadingMaxRetry: 20,
      manifestLoadingRetryDelay: 500,
      manifestLoadingMaxRetryTimeout: 30000,
      levelLoadingMaxRetry: 20,
      levelLoadingRetryDelay: 500,
      levelLoadingMaxRetryTimeout: 30000,

      // Start at lowest level to reduce initial buffering stalls
      startLevel: -1,
      autoStartOnStall: true,

      // Allow jumping over small buffer holes automatically
      nudgeMaxRetry: 10,
      nudgeOffset: 0.2,

      // Longer timeout before abandoning a segment
      fragLoadingTimeOut: 20000,
      manifestLoadingTimeOut: 20000,
      levelLoadingTimeOut: 20000,

      xhrSetup(xhr) {
        const ua = document.getElementById('ua-select').value;
        if (ua) try { xhr.setRequestHeader('User-Agent', ua); } catch(err){}
        if (referer) try { xhr.setRequestHeader('Referer', referer); } catch(err){}
      }
    };
  }

  // --- IMPROVED: Aggressive stall watcher ---
  function startStallWatcher(vid) {
    clearStallWatcher();
    lastTime = -1;
    lastTimeStamp = Date.now();

    stallTimer = setInterval(() => {
      if (!vid || vid.paused || vid.ended || vid.readyState < 2) return;

      const now = Date.now();
      const t = vid.currentTime;

      if (t === lastTime) {
        const stalledFor = (now - lastTimeStamp) / 1000;

        if (stalledFor >= 3) {
          // Try to jump ahead in buffer
          try {
            const ranges = vid.buffered;
            if (ranges.length > 0) {
              const end = ranges.end(ranges.length - 1);
              if (end - t > 0.5) {
                vid.currentTime = end - 0.3;
              }
            }
          } catch(e) {}

          // Resume loading
          if (hlsInst) {
            try { hlsInst.startLoad(); } catch(e) {}
          }

          vid.play().catch(() => {});
        }

        // If stalled for too long, do a soft reconnect
        if (stalledFor >= 12) {
          softReconnect();
        }
      } else {
        lastTime = t;
        lastTimeStamp = now;
      }
    }, 1000);
  }

  function clearStallWatcher() {
    if (stallTimer) { clearInterval(stallTimer); stallTimer = null; }
  }

  // --- NEW: Soft reconnect - reattaches HLS without flickering ---
  function softReconnect() {
    if (!cur || !hlsInst) return;
    console.log('[Player] Soft reconnect triggered');
    try {
      hlsInst.stopLoad();
      setTimeout(() => {
        if (!hlsInst) return;
        hlsInst.loadSource(cur.url);
        hlsInst.startLoad(-1);
        const vid = document.getElementById('vplayer');
        if (vid) vid.play().catch(() => {});
        lastTime = -1;
        lastTimeStamp = Date.now();
      }, 800);
    } catch(e) {}
  }

  // --- NEW: Keep-alive ping to detect connection drops early ---
  function startKeepAlive() {
    stopKeepAlive();
    keepAliveTimer = setInterval(() => {
      if (!cur || !hlsInst) return;
      const vid = document.getElementById('vplayer');
      if (!vid || vid.paused || vid.ended) return;
      // If readyState drops to HAVE_NOTHING, reconnect
      if (vid.readyState === 0) {
        softReconnect();
      }
    }, 5000);
  }

  function stopKeepAlive() {
    if (keepAliveTimer) { clearInterval(keepAliveTimer); keepAliveTimer = null; }
  }

  // --- NEW: Exponential backoff retry ---
  function scheduleRetry(url, name, referer) {
    if (retryTimer) clearTimeout(retryTimer);
    const delay = Math.min(1000 * Math.pow(1.5, retryCount), 15000);
    retryCount++;
    console.log(`[Player] Retry #${retryCount} in ${Math.round(delay/1000)}s`);
    retryTimer = setTimeout(() => {
      if (cur && cur.url === url) {
        playInternal(url, name, referer, false);
      }
    }, delay);
  }

  try { favs = JSON.parse(localStorage.getItem('xomfavs') || '[]'); } catch(e) { favs = []; }
  let curFilter = null;
  let curSubgroup = null;
  let dragSource = null;

  function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  function destroyPlayers() {
    clearStallWatcher();
    stopKeepAlive();
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    if (hlsInst) { try { hlsInst.destroy(); } catch(e){} hlsInst = null; }
    if (dashInst) { try { dashInst.reset(); } catch(e){} dashInst = null; }
    retryCount = 0;
  }

  function getSubgroupLabel(subgroupKey) {
    const sg = subgroups.telewebion.find(s => s.key === subgroupKey);
    return sg ? sg.label : '';
  }

  function render(filter, sgFilter) {
    curFilter = filter;
    curSubgroup = sgFilter;
    const catNames = { telewebion:'📡 Telewebion', ifilm:'🎬 iFilm' };

    const chRow = (ch, idx, catKey) => {
      const star = favs.some(f=>f.url===ch.url) ? '⭐' : '☆';
      const activeClass = (cur && cur.url===ch.url) ? 'active' : '';
      const colorClass = ch.color || '';
      return `<div class="channel-item ${colorClass} ${activeClass}" draggable="true" data-url="${esc(ch.url)}" data-name="${esc(ch.name)}" data-cat="${catKey}" data-idx="${idx}">
        <span>${ch.icon ? ch.icon + ' ' : ''}${ch.name}</span>
        <button class="fav-btn" onclick="event.stopPropagation();fav('${esc(ch.url)}','${esc(ch.name)}')">${star}</button>
      </div>`;
    };

    let html = '';

    if (filter === 'telewebion' || (!filter)) {
      const catArr = channels.telewebion;
      const sgMap = new Map();
      for (const sg of subgroups.telewebion) sgMap.set(sg.key, { label: sg.label, items: [] });
      catArr.forEach((ch, idx) => {
        const sgKey = ch.subgroup || 'sarasari';
        if (sgMap.has(sgKey)) sgMap.get(sgKey).items.push({ch, idx});
      });

      if (sgFilter) {
        const sg = sgMap.get(sgFilter);
        if (sg && sg.items.length > 0) {
          html += `<div class="category-title">${sg.label} (${sg.items.length})</div>`;
          html += sg.items.map(({ch, idx}) => chRow(ch, idx, 'telewebion')).join('');
        }
      } else {
        html += `<div class="category-title">${catNames.telewebion} (${catArr.length})</div>`;
        for (const [sgKey, sg] of sgMap) {
          if (sg.items.length === 0) continue;
          html += `<div class="subgroup-title">${sg.label}</div>`;
          html += sg.items.map(({ch, idx}) => chRow(ch, idx, 'telewebion')).join('');
        }
      }
    }

    if ((filter === 'ifilm' || (!filter)) && !sgFilter) {
      const catArr = channels.ifilm;
      html += `<div class="category-title">${catNames.ifilm} (${catArr.length})</div>`;
      html += catArr.map((ch, i) => chRow(ch, i, 'ifilm')).join('');
    }

    document.getElementById('ch-container').innerHTML = html;
    attachDragListeners();
    attachChannelEvents();
  }

  function attachChannelEvents() {
    document.querySelectorAll('.channel-item').forEach(el => {
      el.addEventListener('click', function(ev) {
        if (ev.target.classList.contains('fav-btn')) return;
        play(this.dataset.url, this.dataset.name, this.dataset.referer || '');
      });
    });
  }

  function attachDragListeners() {
    document.querySelectorAll('.channel-item[draggable="true"]').forEach(el => {
      el.addEventListener('dragstart', dragStart);
      el.addEventListener('dragend', dragEnd);
      el.addEventListener('dragover', dragOver);
      el.addEventListener('dragleave', dragLeave);
      el.addEventListener('drop', drop);
    });
  }

  function dragStart(e) {
    dragSource = e.target.closest('.channel-item');
    if(!dragSource) return;
    e.dataTransfer.setData('text/plain', 'drag');
    e.dataTransfer.effectAllowed = 'move';
    dragSource.style.opacity = '0.5';
  }
  function dragEnd() {
    if(dragSource) dragSource.style.opacity = '';
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
    dragSource = null;
  }
  function dragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.target.closest('.channel-item');
    if(target && target !== dragSource) target.classList.add('drag-over');
  }
  function dragLeave(e) {
    const target = e.target.closest('.channel-item');
    if(target) target.classList.remove('drag-over');
  }
  function drop(e) {
    e.preventDefault();
    const targetItem = e.target.closest('.channel-item');
    if(!dragSource || !targetItem || dragSource === targetItem) { cleanupDrag(); return; }
    const srcCat = dragSource.dataset.cat;
    const tgtCat = targetItem.dataset.cat;
    if(srcCat !== tgtCat) { cleanupDrag(); return; }
    const srcIdx = parseInt(dragSource.dataset.idx);
    const tgtIdx = parseInt(targetItem.dataset.idx);
    if(isNaN(srcIdx) || isNaN(tgtIdx)) { cleanupDrag(); return; }
    let arr = [...channels[srcCat]];
    const [moved] = arr.splice(srcIdx, 1);
    arr.splice(tgtIdx, 0, moved);
    reorderCategory(srcCat, arr);
    render(curFilter, curSubgroup);
    cleanupDrag();
  }
  function cleanupDrag() {
    if(dragSource) dragSource.style.opacity = '';
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
    dragSource = null;
  }

  function play(url, name, referer) {
    if (window.innerWidth <= 768) document.getElementById('channel-list').classList.remove('show');
    cur = {url, name, referer: referer || ''};
    retryCount = 0;
    document.getElementById('ch-title').textContent = name;
    destroyPlayers();
    const wrap = document.getElementById('vwrap');
    wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div><span style="margin-left:12px;">Laddar ${name}…</span></div>`;
    render(curFilter, curSubgroup);
    setTimeout(() => playInternal(url, name, referer || '', true), 50);
  }

  function playInternal(url, name, referer, showSpinner) {
    const wrap = document.getElementById('vwrap');
    if (!wrap) return;

    if (!jsEnabled) {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
      const vid = document.getElementById('vplayer');
      vid.src = url;
      vid.play().catch(() => {
        wrap.innerHTML = `<div class="error-msg"><h3>⚠️ JS AV: Kunde inte spela</h3><p>${url.substring(0,70)}</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`;
      });
      return;
    }

    // Reuse existing video element if already there (soft reconnect path)
    let vid = document.getElementById('vplayer');
    if (!vid) {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
      vid = document.getElementById('vplayer');
    }

    // Visibility change: auto-recover when tab regains focus
    document.removeEventListener('visibilitychange', onVisibilityChange);
    document.addEventListener('visibilitychange', onVisibilityChange);

    if (Hls.isSupported()) {
      if (hlsInst) { try { hlsInst.destroy(); } catch(e){} hlsInst = null; }
      hlsInst = new Hls(getHlsConfig(referer));
      hlsInst.loadSource(url);
      hlsInst.attachMedia(vid);

      hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
        vid.play().catch(err => console.warn(err));
        startStallWatcher(vid);
        startKeepAlive();
        retryCount = 0;
      });

      hlsInst.on(Hls.Events.ERROR, (_, d) => {
        console.warn('[HLS Error]', d.type, d.details, d.fatal);
        if (!d.fatal) {
          // Non-fatal: nudge the loader
          if (d.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR ||
              d.details === Hls.ErrorDetails.BUFFER_NUDGE_ON_STALL) {
            try { hlsInst.startLoad(); } catch(e) {}
            vid.play().catch(()=>{});
          }
          return;
        }
        // Fatal errors
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR) {
          scheduleRetry(url, name, referer);
        } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
          try { hlsInst.recoverMediaError(); } catch(e) {}
          setTimeout(() => { if (hlsInst) hlsInst.swapAudioCodec(); }, 500);
          setTimeout(() => { if (hlsInst) hlsInst.recoverMediaError(); }, 1000);
        } else {
          scheduleRetry(url, name, referer);
        }
      });

      // Emergency fragment abort: restart loading immediately
      hlsInst.on(Hls.Events.FRAG_LOAD_EMERGENCY_ABORTED, () => {
        setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, 500);
      });

      // When a level is loaded, reset retry counter
      hlsInst.on(Hls.Events.LEVEL_LOADED, () => { retryCount = 0; });

    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (Safari/iOS)
      vid.src = url;
      vid.addEventListener('error', () => scheduleRetry(url, name, referer), { once: true });
      vid.addEventListener('stalled', () => {
        setTimeout(() => { vid.load(); vid.play().catch(()=>{}); }, 1000);
      });
      vid.addEventListener('waiting', () => {
        setTimeout(() => { vid.play().catch(()=>{}); }, 500);
      });
      vid.play().catch(() => scheduleRetry(url, name, referer));
      startStallWatcher(vid);
      startKeepAlive();
    } else {
      showErr();
    }
  }

  // --- NEW: Recover when tab becomes visible again ---
  function onVisibilityChange() {
    if (document.visibilityState === 'visible' && cur) {
      const vid = document.getElementById('vplayer');
      if (!vid) return;
      if (vid.paused || vid.readyState < 2) {
        if (hlsInst) {
          try { hlsInst.startLoad(); } catch(e) {}
        }
        vid.play().catch(() => softReconnect());
      }
    }
  }

  function showErr() {
    document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte ladda stream</h3><p>Prova att trycka JS AV-knappen ovan.</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`;
  }

  function reload() {
    if (cur) {
      retryCount = 0;
      play(cur.url, cur.name, cur.referer);
    }
  }
  function pip() { const v=document.getElementById('vplayer'); if(v && document.pictureInPictureEnabled) { document.pictureInPictureElement ? document.exitPictureInPicture() : v.requestPictureInPicture().catch(()=>{}); } }
  function fs() { const w=document.getElementById('vwrap'); document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen().catch(()=>{}); }

  function toggleTV() {
    tvMode = !tvMode;
    document.body.classList.toggle('tv-mode', tvMode);
    document.getElementById('tv-btn').textContent = tvMode ? '🖥️ Normal' : '📺 TV-läge';
    if(tvMode && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    else if(document.fullscreenElement) document.exitFullscreen();
    localStorage.setItem('xomtv', tvMode ? '1' : '');
    if (cur) reload();
  }

  function toggleJSengine() {
    jsEnabled = !jsEnabled;
    const btn = document.getElementById('jsToggleBtn');
    btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
    btn.classList.toggle('js-toggle-off', !jsEnabled);
    if (cur) play(cur.url, cur.name, cur.referer);
    else document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>🔘 JS är nu ${jsEnabled ? 'AKTIVERAD' : 'AVSTÄNGD'}</h3><p>Välj en kanal igen.</p></div>`;
    localStorage.setItem('xom_js_toggle', jsEnabled ? 'on' : 'off');
  }

  function showAll(btn) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    curFilter = null; curSubgroup = null;
    render(null, null);
  }
  function filterCat(btn, cat) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    curSubgroup = null;
    render(cat, null);
  }
  function filterSubgroup(btn, sgKey) {
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render('telewebion', sgKey);
  }
  function toggleList() { document.getElementById('channel-list').classList.toggle('show'); }
  function fav(url, name) {
    const i = favs.findIndex(f=>f.url===url);
    i > -1 ? favs.splice(i,1) : favs.push({url,name});
    localStorage.setItem('xomfavs', JSON.stringify(favs));
    render(curFilter, curSubgroup);
  }

  (function loadPrefs() {
    try {
      const savedJS = localStorage.getItem('xom_js_toggle');
      jsEnabled = savedJS !== 'off';
      const btn = document.getElementById('jsToggleBtn');
      btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
      btn.classList.toggle('js-toggle-off', !jsEnabled);
    } catch(err) {}
    const ua = navigator.userAgent || '';
    const detectedTV = /SmartTV|webOS|SMART-TV|HbbTV|NetCast|BRAVIA|Tizen/i.test(ua) ||
      (window.innerWidth >= 1920 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0);
    if (detectedTV || localStorage.getItem('xomtv') === '1') {
      document.body.classList.add('tv-mode');
      tvMode = true;
      document.getElementById('tv-btn').textContent = '🖥️ Normal';
    }
  })();

  render(null, null);
</script>
</body>
