  function buildTelewebionFlat() {
    const flat = [];
    for (const sg of subgroups.telewebion) {
      for (const ch of sg.channels) flat.push({...ch, subgroup: sg.key});
    }
    return flat;
  }

  function loadOrder(cat) { try { const o = localStorage.getItem(`order_${cat}`); return o ? JSON.parse(o) : null; } catch(e){ return null; } }
  function saveOrder(cat, arr) { localStorage.setItem(`order_${cat}`, JSON.stringify(arr.map(c=>c.url))); }
  function applyStoredOrderFlat(flat, catKey) {
    const stored = loadOrder(catKey);
    if(!stored || !stored.length) return flat;
    const map = new Map(flat.map(c=>[c.url, c]));
    const ordered = [];
    for(let url of stored) if(map.has(url)) ordered.push(map.get(url));
    for(let c of flat) if(!ordered.includes(c)) ordered.push(c);
    return ordered;
  }

      lowLatencyMode: false,

      maxBufferSize: tv ? 180 * 1000 * 1000 : 80 * 1000 * 1000,
      maxBufferHole: 0.3,
      liveSyncDurationCount: tv ? 6 : 3,
      liveMaxLatencyDurationCount: tv ? 12 : 6,
      liveDurationInfinity: false,
      backBufferLength: 60,
      abrEwmaDefaultEstimate: 5e5,
      abrEwmaFastLive: 3.0,
      abrEwmaSlowLive: 9.0,
      abrBandWidthFactor: 0.95,
      abrBandWidthUpFactor: 0.7,
      minAutoBitrate: 300000,
      maxAutoBitrate: tv ? 8000000 : 5000000,
      fragLoadingMaxRetry: 8,
      fragLoadingRetryDelay: 1000,
      fragLoadingMaxRetryTimeout: 20000,
      manifestLoadingMaxRetry: 6,
      manifestLoadingRetryDelay: 1500,
      levelLoadingMaxRetry: 6,
      startLevel: -1,
      autoStartOnStall: true,
      nudgeOffset: 0.5,
      nudgeMaxRetry: 5,
      xhrSetup: (xhr) => {
        const ua = document.getElementById('ua-select').value;
        if (ua) try { xhr.setRequestHeader('User-Agent', ua); } catch(e) {}
      }
    };
  }

  function showBuffering(show) {
    const el = document.getElementById('bufferingIndicator');
    if (el) el.style.display = show ? 'flex' : 'none';
  }

  function startStallMonitor(video) {
    if (stallCheckInterval) clearInterval(stallCheckInterval);
    lastCurrentTime = video.currentTime;
    stallCheckInterval = setInterval(() => {
      if (!video || video.paused || video.ended || !cur) return;
      if (video.readyState < 2 || (video.buffered.length > 0 && video.currentTime === lastCurrentTime && video.currentTime > 0 && video.readyState < 3)) {
        showBuffering(true);
        if (hlsInst && hlsInst.levels && hlsInst.levels.length > 1) {
          const currentLevel = hlsInst.currentLevel;
          if (currentLevel > 0) hlsInst.currentLevel = currentLevel - 1;
        }
        if (hlsInst) hlsInst.startLoad();
        video.play().catch(e => console.warn("Play retry", e));
      } else {
        showBuffering(false);
      }
      lastCurrentTime = video.currentTime;
    }, 4000);
  }

  function stopStallMonitor() { if (stallCheckInterval) { clearInterval(stallCheckInterval); stallCheckInterval = null; } showBuffering(false); }

  function destroyPlayers() {
    stopStallMonitor();
    if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  }

  function play(url, name, referer) {
    if (window.innerWidth <= 768) document.getElementById('channel-list').classList.remove('show');
    cur = { url, name, referer };
    document.getElementById('ch-title').innerHTML = `${name}`;
    destroyPlayers();
    const wrap = document.getElementById('vwrap');
    if (!jsEnabled) {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
      const vid = document.getElementById('vplayer');
      vid.src = url;
      vid.play().catch(() => { wrap.innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte spela</h3><button class="btn" onclick="reload()">Försök igen</button></div>`; });
      render(curFilter, curSubgroup);
      return;
    }
    wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div><span style="margin-left:12px;">Laddar ${name}…</span></div>`;
    setTimeout(() => {
      wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video><div id="bufferingIndicator" class="buffering-overlay">⏳ Buffrar ...</div>';
      const vid = document.getElementById('vplayer');
      if (Hls.isSupported()) {
        hlsInst = new Hls(getOptimalHlsConfig());
        hlsInst.loadSource(url);
        hlsInst.attachMedia(vid);
        hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
          vid.play().catch(e => console.warn(e));
          startStallMonitor(vid);
        });
        hlsInst.on(Hls.Events.BUFFER_STALLED, () => { if (hlsInst) hlsInst.startLoad(); });
        hlsInst.on(Hls.Events.FRAG_LOAD_EMERGENCY_ABORTED, () => { setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, 1000); });
        hlsInst.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              const delay = (isTV() || tvMode) ? 3000 : 1500;
              setTimeout(() => { if (hlsInst) hlsInst.startLoad(); }, delay);
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hlsInst.recoverMediaError();
            } else {
              showErr();
            }
          } else if (data.details === 'bufferStalledError') {
            if (vid && hlsInst) hlsInst.startLoad();
          }
        });
        hlsInst.on(Hls.Events.LEVEL_SWITCHING, (_, data) => { if (data.level === 0 && hlsInst.autoLevelEnabled === false) hlsInst.autoLevelEnabled = true; });
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = url;
        vid.play().catch(() => showErr());
        startStallMonitor(vid);
      } else { showErr(); }
      render(curFilter, curSubgroup);
    }, 30);
  }

  function showErr() { document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte ladda stream</h3><p>Försök med "JS AV" eller ladda om.</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`; }
  function reload() { if (cur) play(cur.url, cur.name, cur.referer); }
  function pip() { const v = document.getElementById('vplayer'); if(v && document.pictureInPictureEnabled) { document.pictureInPictureElement ? document.exitPictureInPicture() : v.requestPictureInPicture().catch(()=>{}); } }
  function fs() { const w = document.getElementById('vwrap'); document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen().catch(()=>{}); }
  function toggleTV() { tvMode = !tvMode; document.body.classList.toggle('tv-mode', tvMode); document.getElementById('tv-btn').textContent = tvMode ? '🖥️ Normal' : '📺 TV-läge'; if(tvMode && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{}); else if(document.fullscreenElement) document.exitFullscreen(); localStorage.setItem('xomtv', tvMode ? '1' : ''); if (cur) reload(); }
  function toggleJSengine() { jsEnabled = !jsEnabled; const btn = document.getElementById('jsToggleBtn'); btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV'; btn.classList.toggle('js-toggle-off', !jsEnabled); if (cur) play(cur.url, cur.name, cur.referer); else document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>🔘 JS är nu ${jsEnabled ? 'AKTIVERAD' : 'AVSTÄNGD'}</h3><p>Välj en kanal igen.</p></div>`; localStorage.setItem('xom_js_toggle', jsEnabled ? 'on' : 'off'); }

  function getSubgroupLabel(subgroupKey) { const sg = subgroups.telewebion.find(s => s.key === subgroupKey); return sg ? sg.label : ''; }

  function render(filter, sgFilter) {
    curFilter = filter; curSubgroup = sgFilter;
    const chRow = (ch, idx, catKey) => {
      const star = favs.some(f=>f.url===ch.url) ? '⭐' : '☆';
      const activeClass = (cur && cur.url===ch.url) ? 'active' : '';
      return `<div class="channel-item ${ch.color||''} ${activeClass}" draggable="true" data-url="${escapeHtml(ch.url)}" data-name="${escapeHtml(ch.name)}" data-cat="${catKey}" data-idx="${idx}">
        <span>${ch.icon || '📡'} ${ch.name}</span>
        <button class="fav-btn" onclick="event.stopPropagation();fav('${escapeHtml(ch.url)}','${escapeHtml(ch.name)}')">${star}</button>
      </div>`;
    };
    let html = '';
    if (filter === 'telewebion' || (!filter)) {
      const catArr = channels.telewebion;
      const sgMap = new Map();
      for (const sg of subgroups.telewebion) sgMap.set(sg.key, { label: sg.label, items: [] });
      catArr.forEach((ch, idx) => { const sgKey = ch.subgroup || 'sarasari'; if (sgMap.has(sgKey)) sgMap.get(sgKey).items.push({ch, idx}); });
      if (sgFilter) {
        const sg = sgMap.get(sgFilter);
        if (sg && sg.items.length) { html += `<div class="category-title">${sg.label} (${sg.items.length})</div>` + sg.items.map(({ch, idx}) => chRow(ch, idx, 'telewebion')).join(''); }
      } else {
        if (!filter) html += `<div class="category-title">📡 Telewebion (${catArr.length})</div>`;
        for (const [sgKey, sg] of sgMap) { if(sg.items.length) { html += `<div class="subgroup-title">${sg.label}</div>` + sg.items.map(({ch, idx}) => chRow(ch, idx, 'telewebion')).join(''); } }
      }
    }
    if ((filter === 'ifilm' || (!filter)) && !sgFilter) {
      const catArr = channels.ifilm;
      html += `<div class="category-title">🎬 iFilm (${catArr.length})</div>` + catArr.map((ch, i) => chRow(ch, i, 'ifilm')).join('');
    }
    document.getElementById('ch-container').innerHTML = html;
    attachDragListeners(); attachChannelEvents();
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function attachChannelEvents() { document.querySelectorAll('.channel-item').forEach(el => { el.addEventListener('click', function(ev) { if(ev.target.classList.contains('fav-btn')) return; play(this.dataset.url, this.dataset.name, this.dataset.referer || ''); }); }); }
  function attachDragListeners() { document.querySelectorAll('.channel-item[draggable="true"]').forEach(el => { el.addEventListener('dragstart', dragStart); el.addEventListener('dragend', dragEnd); el.addEventListener('dragover', dragOver); el.addEventListener('dragleave', dragLeave); el.addEventListener('drop', drop); }); }
  let dragSource = null;
  function dragStart(e) { dragSource = e.target.closest('.channel-item'); if(!dragSource) return; e.dataTransfer.setData('text/plain', 'drag'); e.dataTransfer.effectAllowed = 'move'; dragSource.style.opacity = '0.5'; }
  function dragEnd() { if(dragSource) dragSource.style.opacity = ''; document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over')); dragSource = null; }
  function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; const target = e.target.closest('.channel-item'); if(target && target !== dragSource) target.classList.add('drag-over'); }
  function dragLeave(e) { const target = e.target.closest('.channel-item'); if(target) target.classList.remove('drag-over'); }
  function drop(e) { e.preventDefault(); const targetItem = e.target.closest('.channel-item'); if(!dragSource || !targetItem || dragSource === targetItem) { cleanupDrag(); return; } const srcCat = dragSource.dataset.cat, tgtCat = targetItem.dataset.cat; if(srcCat !== tgtCat) { cleanupDrag(); return; } let arr = [...channels[srcCat]]; const [moved] = arr.splice(parseInt(dragSource.dataset.idx), 1); arr.splice(parseInt(targetItem.dataset.idx), 0, moved); reorderCategory(srcCat, arr); render(curFilter, curSubgroup); cleanupDrag(); }
  function cleanupDrag() { if(dragSource) dragSource.style.opacity = ''; document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over')); dragSource = null; }

  function showAll(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); curFilter = null; curSubgroup = null; render(null, null); }
  function filterCat(btn, cat) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); curSubgroup = null; render(cat, null); }
  function filterSubgroup(btn, sgKey) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render('telewebion', sgKey); }
  function toggleList() { document.getElementById('channel-list').classList.toggle('show'); }
  function fav(url, name) { const i = favs.findIndex(f=>f.url===url); i > -1 ? favs.splice(i,1) : favs.push({url,name}); localStorage.setItem('xomfavs', JSON.stringify(favs)); render(curFilter, curSubgroup); }

  (function loadPrefs() {
    try { const savedJS = localStorage.getItem('xom_js_toggle'); jsEnabled = savedJS !== 'off'; const btn = document.getElementById('jsToggleBtn'); btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV'; btn.classList.toggle('js-toggle-off', !jsEnabled); } catch(e) {}
    const detectedTV = isTV(); if (detectedTV || localStorage.getItem('xomtv') === '1') { document.body.classList.add('tv-mode'); tvMode = true; document.getElementById('tv-btn').textContent = '🖥️ Normal'; }
    try { favs = JSON.parse(localStorage.getItem('xomfavs') || '[]'); } catch(e) { favs = []; }
  })();
  render(null, null);
</script>
</body>
</html>
