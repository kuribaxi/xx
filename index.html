</div>

<div class="container">

    <div class="video-header">
      <div>

            <option value="Mozilla/5.0 (iPad; CPU OS 14_0 like Mac OS X)">📲 iPad</option>
            <option value="Mozilla/5.0 (Linux; Android 10)">🤖 Android</option>

        </div>
      </div>
      <div class="video-controls">

        <button class="btn" onclick="fs()">⛶ Fullskärm</button>

        <button class="btn" id="jsToggleBtn" onclick="toggleJSengine()">⚙️ JS PÅ</button>
      </div>
    </div>
    <div class="video-wrapper" id="vwrap">

</div>

      { name: 'JAM',          url: 'https://cdnw.telewebion.com/jam/live/playlist.m3u8',               color: 'purple' },
      { name: 'SHOMA',        url: 'https://cdnw.telewebion.com/shoma/live/playlist.m3u8',             color: 'purple' },
      { name: 'IRANKALA',     url: 'https://cdnw.telewebion.com/irankala/live/playlist.m3u8',          color: 'purple' },
      { name: 'NESFEJAHAN',   url: 'https://cdnw.telewebion.com/nesfejahan/live/playlist.m3u8',        color: 'purple' },
      { name: 'SARBEDARAN',   url: 'https://cdnw.telewebion.com/sarbedaran/live/playlist.m3u8',        color: 'purple' },
    ],
    websites: [
      { name: 'IMVBox',       url: 'https://www.imvbox.com/en',              method: 'external', color: 'orange' },
      { name: 'TV.GARDEN',    url: 'https://famelack.com/ir',                method: 'external', color: 'orange' },
      { name: 'YJC',          url: 'https://www.yjc.ir/fa/live',             method: 'external', color: 'orange' },
      { name: 'YOZONLINE',    url: 'https://yozonline.ir/tv1/',               method: 'external', color: 'orange' },
      { name: 'Persianity',   url: 'https://persianity.com',                 method: 'external', color: 'orange' },
      { name: 'Parsa TV',     url: 'https://parsatv.com',                    method: 'external', color: 'orange' },
      { name: 'MDB Max',      url: 'https://mdbmax.com/',                    method: 'external', color: 'orange' },
      { name: 'FarsiPlex',    url: 'https://farsiplex.com',                  method: 'external', color: 'orange' },
      { name: 'Flnd Buzz',    url: 'https://flnd.buzz/',                     method: 'external', color: 'orange' },
      { name: 'Farsiland',    url: 'https://farsiland.com/movies',           method: 'external', color: 'orange' },
      { name: 'Persian Hive', url: 'https://persianhive.com',                method: 'external', color: 'orange' },
      { name: 'Namakade',     url: 'https://namakade.com',                   method: 'external', color: 'orange' },
      { name: 'Telewebion',   url: 'https://telewebion.ir/',                 method: 'external', color: 'orange' },
      { name: 'Sepehr TV',    url: 'https://beta.sepehrtv.ir/',              method: 'external', color: 'orange' },
      { name: 'Sassan TV',    url: 'https://sassantv.com/',                  method: 'external', color: 'orange' },
      { name: 'Giniko TV',    url: 'https://giniko.com/watch.php?id=iran',   method: 'external', color: 'orange' },
    ]
  };

  let hlsInst = null;
  let cur = null;
  let favs = [];
  let jsEnabled = true;
  try { favs = JSON.parse(localStorage.getItem('xomfavs') || '[]'); } catch(e) { favs = []; }
  let curFilter = null;
  let curSub = 'all';

  function e(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  function render(filter, sub) {
    curFilter = filter; curSub = sub || 'all';
    const catNames = { national:'🏛 Nationella', regional:'🗺 Regionala', telewebion:'📡 Telewebion', websites:'🌐 Webbplatser' };
    const row = ch => {
      const m = ch.method || 'hls';
      const badge = m==='iframe' ? ' <span class="tag">📺 live</span>' : m==='external' ? ' <span class="tag">🔗</span>' : '';
      const star = favs.some(f=>f.url===ch.url) ? '⭐' : '☆';
      const activeClass = (cur && cur.url===ch.url) ? 'active' : '';
      return `<div class="channel-item ${ch.color} ${activeClass}" onclick="play('${e(ch.url)}','${e(ch.name)}','${m}','${ch.referer||''}')">
        <span>${ch.name}${badge}</span>
        <button class="fav-btn" onclick="event.stopPropagation();fav('${e(ch.url)}','${e(ch.name)}')">${star}</button>
      </div>`;
    };
    let html = '';
    if (filter && channels[filter]) {
      html = `<div class="category-title">${catNames[filter]} (${channels[filter].length})</div>` + channels[filter].map(row).join('');
    } else {
      Object.keys(channels).forEach(cat => {
        html += `<div class="category-title">${catNames[cat]}</div>` + channels[cat].map(row).join('');
      });
    }
    document.getElementById('ch-container').innerHTML = html;
  }

  function setActive(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  function showAll() { setActive(document.querySelector('.nav-btn')); render(null,'all'); }
  function filterCat(ev, cat) { setActive(ev.target); render(cat,'all'); }
  function toggleList() { document.getElementById('channel-list').classList.toggle('show'); }
  function fav(url,name) { const i=favs.findIndex(f=>f.url===url); i>-1? favs.splice(i,1): favs.push({url,name}); if(localStorage) localStorage.setItem('xomfavs',JSON.stringify(favs)); render(curFilter,curSub); }

  function play(url, name, method, referer) {
    if (window.innerWidth <= 768) document.getElementById('channel-list').classList.remove('show');
    cur = {url, name, method, referer};
    document.getElementById('ch-title').textContent = name;
    if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
    const wrap = document.getElementById('vwrap');

    if (method === 'external') { window.open(url, '_blank'); return; }

    if (!jsEnabled) {
      if (method === 'iframe') {
        wrap.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
      } else {
        wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
        const vid = document.getElementById('vplayer');
        vid.src = url;
        vid.play().catch(() => { wrap.innerHTML = `<div class="error-msg"><h3>⚠️ JS AV: Kunde inte spela</h3><p>${url.substring(0,70)}</p><button class="btn" onclick="reload()">↻ Försök igen</button></div>`; });
      }
      render(curFilter, curSub);
      return;
    }

    if (method === 'iframe') {
      wrap.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
      render(curFilter, curSub);
      return;
    }

    wrap.innerHTML = '<video id="vplayer" controls autoplay style="width:100%;height:100%;"></video>';
    const vid = document.getElementById('vplayer');
    if (Hls.isSupported()) {
      hlsInst = new Hls({
        enableWorker: true,
        startPosition: -1,
        liveSyncDurationCount: 3,
        maxBufferLength: 30,
        maxMaxBufferLength: 90,
        fragLoadingMaxRetry: 6,
        manifestLoadingMaxRetry: 5,
        xhrSetup(xhr) {
          const ua = document.getElementById('ua-select').value;
          if (ua) try { xhr.setRequestHeader('User-Agent', ua); } catch(err){}
          if (referer) try { xhr.setRequestHeader('Referer', referer); } catch(err){}
        }
      });
      hlsInst.loadSource(url);
      hlsInst.attachMedia(vid);
      hlsInst.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
      hlsInst.on(Hls.Events.ERROR, (_, d) => {
        if (!d.fatal) return;
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR) setTimeout(()=>{ if(hlsInst) hlsInst.startLoad(); }, 2000);
        else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInst.recoverMediaError();
        else showErr();
      });
    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      vid.src = url; vid.play().catch(()=>{});
    } else {
      showErr();
    }
    render(curFilter, curSub);
  }

  function showErr() { document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>⚠️ Kunde inte ladda stream</h3><br><button class="btn" onclick="reload()">↻ Försök igen</button><br><small>Prova stänga av JS (knappen ovan)</small></div>`; }
  function reload() { if (cur) play(cur.url, cur.name, cur.method, cur.referer); }
  function pip() { const v=document.getElementById('vplayer'); if(v && document.pictureInPictureEnabled) { document.pictureInPictureElement ? document.exitPictureInPicture() : v.requestPictureInPicture().catch(()=>{}); } }
  function fs() { const w=document.getElementById('vwrap'); document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen().catch(()=>{}); }

  let tvMode = false;
  function toggleTV() {
    tvMode=!tvMode;
    document.body.classList.toggle('tv-mode', tvMode);
    document.getElementById('tv-btn').textContent = tvMode ? '🖥️ Normal' : '📺 TV-läge';
    if(tvMode && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    else if(document.fullscreenElement) document.exitFullscreen();
    if(localStorage) localStorage.setItem('xomtv', tvMode ? '1' : '');
  }

  function toggleJSengine() {
    jsEnabled = !jsEnabled;
    const btn = document.getElementById('jsToggleBtn');
    btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
    btn.classList.toggle('js-toggle-off', !jsEnabled);
    if (cur) play(cur.url, cur.name, cur.method, cur.referer);
    else document.getElementById('vwrap').innerHTML = `<div class="error-msg"><h3>🔘 JS är nu ${jsEnabled ? 'AKTIVERAD' : 'AVSTÄNGD'}</h3><p>Välj en kanal igen.</p></div>`;
    if (localStorage) localStorage.setItem('xom_js_toggle', jsEnabled ? 'on' : 'off');
  }

  (function loadPrefs() {
    try {
      const savedJS = localStorage.getItem('xom_js_toggle');
      jsEnabled = savedJS !== 'off';
      const btn = document.getElementById('jsToggleBtn');
      btn.textContent = jsEnabled ? '⚙️ JS PÅ' : '⚠️ JS AV';
      btn.classList.toggle('js-toggle-off', !jsEnabled);
    } catch(err) {}
    const ua = navigator.userAgent || '';
    const isTV = /SmartTV|webOS|SMART-TV|HbbTV|NetCast|BRAVIA|Tizen/i.test(ua) || (window.innerWidth >= 1920 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0);
    if (isTV || (localStorage && localStorage.getItem('xomtv') === '1')) {
      document.body.classList.add('tv-mode'); tvMode = true;
      document.getElementById('tv-btn').textContent = '🖥️ Normal';
    }
  })();

  render(null, 'all');
</script>
</body>
</html>
